<script>
// --- GLOBAL APP STATE ---
let username = "Stranger";
const cursor = document.getElementById('custom-cursor');
const cursorGlow = document.getElementById('custom-cursor-glow');

// --- MOUSE FOLLOWER WITH NEON GLOW ---
document.addEventListener('mousemove', (e) => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
    cursorGlow.style.left = e.clientX + 'px';
    cursorGlow.style.top = e.clientY + 'px';
});

document.addEventListener('mousedown', () => {
    cursor.style.width = '12px';
    cursor.style.height = '12px';
});
document.addEventListener('mouseup', () => {
    cursor.style.width = '20px';
    cursor.style.height = '20px';
});

// --- EXPLOSION & TRANSITION TO CHAT ---
const verifyBtn = document.getElementById('verify-btn');
const authBox = document.getElementById('auth-box');
const authScreen = document.getElementById('auth-screen');
const chatScreen = document.getElementById('chat-screen');
const aiOpenBtn = document.getElementById('ai-trigger-btn');

verifyBtn.addEventListener('click', () => {
    const nameInput = document.getElementById('username-input').value.trim();
    
    // FALLBACK: If blank, automatically assign "Wanderer" so it never freezes
    username = nameInput ? nameInput : "Wanderer";
    document.getElementById('user-display').innerText = `Logged in as: ${username}`;

    // Create explosion visual particles
    const rect = verifyBtn.getBoundingClientRect();
    const btnCenterX = rect.left + rect.width / 2;
    const btnCenterY = rect.top + rect.height / 2;

    for (let i = 0; i < 40; i++) {
        createParticle(btnCenterX, btnCenterY);
    }

    // Animate out entry panel smoothly
    authBox.style.transform = 'scale(0.4)';
    authScreen.style.opacity = '0';
    authScreen.style.pointerEvents = 'none';

    // Transition in Chat Matrix smoothly
    setTimeout(() => {
        authScreen.style.display = 'none';
        chatScreen.style.pointerEvents = 'all';
        chatScreen.style.opacity = '1';
        chatScreen.style.transform = 'translateY(0) scale(1)';
        document.getElementById('ai-open-btn').style.display = 'block';
        
        startStrangerSimulation();
    }, 600);
});

function createParticle(x, y) {
    const particle = document.createElement('div');
    particle.classList.add('particle');
    document.body.appendChild(particle);

    const size = Math.random() * 60 + 20;
    particle.style.width = `${size}px`;
    particle.style.height = `${size}px`;
    particle.style.left = `${x - size/2}px`;
    particle.style.top = `${y - size/2}px`;

    const angle = Math.random() * Math.PI * 2;
    const velocity = Math.random() * 15 + 5;
    const destinationX = Math.cos(angle) * velocity * 25;
    const destinationY = Math.sin(angle) * velocity * 25;

    particle.animate([
        { transform: 'translate(0, 0) scale(1)', opacity: 1 },
        { transform: `translate(${destinationX}px, ${destinationY}px) scale(0)`, opacity: 0 }
    ], {
        duration: 1000 + Math.random() * 600,
        easing: 'cubic-bezier(0.1, 0.8, 0.3, 1)',
        fill: 'forwards'
    });

    setTimeout(() => particle.remove(), 1600);
}

// --- SIMULATED RANDOM CHAT LAYER ---
const chatInput = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');
const globalMessages = document.getElementById('global-messages');

function appendMessage(sender, text, isOutgoing = false) {
    const msg = document.createElement('div');
    msg.className = `message ${isOutgoing ? 'outgoing' : 'incoming'}`;
    
    const tag = document.createElement('span');
    tag.className = 'user-tag';
    if(isOutgoing) tag.style.color = 'var(--neon-purple)';
    tag.innerText = sender;

    msg.appendChild(tag);
    msg.appendChild(document.createTextNode(text));
    globalMessages.appendChild(msg);
    globalMessages.scrollTop = globalMessages.scrollHeight;
}

function handleSendMessage() {
    const text = chatInput.value.trim();
    if(!text) return;
    appendMessage(username, text, true);
    chatInput.value = '';
}

sendBtn.addEventListener('click', handleSendMessage);
chatInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') handleSendMessage(); });

const strangerPool = ['VortexRider', 'PixelKnight', 'NeonGhost', 'GlitchMage', 'ZeroCool', 'NovaFlux'];
const phrasePool = [
    "Did anyone catch the quantum update today?",
    "The design layout of this hub is incredible.",
    "Are we all interconnected nodes here or what?",
    "Just testing out my neural transmission links.",
    "Anyone up for exploring some algorithmic puzzles?",
    "Beautiful evening in cyberspace."
];

function startStrangerSimulation() {
    setInterval(() => {
        if(Math.random() > 0.4) {
            const randomUser = strangerPool[Math.floor(Math.random() * strangerPool.length)];
            const randomText = phrasePool[Math.floor(Math.random() * phrasePool.length)];
            appendMessage(randomUser, randomText, false);
        }
    }, 5000);
}

// --- WAVY OCEAN CLOUD CANVAS ANIMATION & AI SYSTEM ---
const canvas = document.getElementById('wave-canvas');
const ctx = canvas.getContext('2d');
let animationFrameId;
let waveProgress = 0;
let isAiActive = false;

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function drawWaves() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    renderSingleWaveLayer(0.003, 40, waveProgress, 'rgba(10, 25, 50, ', 0.9);
    renderSingleWaveLayer(0.005, 60, waveProgress * 1.3, 'rgba(15, 35, 75, ', 0.7);
    renderSingleWaveLayer(0.002, 80, waveProgress * 0.7, 'rgba(0, 50, 90, ', 0.5);
    renderSingleWaveLayer(0.004, 110, waveProgress * 1.5, 'rgba(157, 0, 255, ', 0.15);

    if (isAiActive) {
        waveProgress += 0.015;
        animationFrameId = requestAnimationFrame(drawWaves);
    }
}

function renderSingleWaveLayer(frequency, amplitude, offset, colorPrefix, alphaMax) {
    ctx.fillStyle = colorPrefix + (alphaMax * Math.min(1, waveProgress)) + ')';
    ctx.beginPath();
    ctx.moveTo(0, canvas.height);

    for (let x = 0; x <= canvas.width; x += 10) {
        const dynamicY = Math.sin(x * frequency + offset) * amplitude 
                       + Math.cos(x * 0.001 + offset * 0.5) * (amplitude * 0.5);
        
        const verticalBase = canvas.height - (canvas.height * Math.min(1, waveProgress * 0.85)) + dynamicY;
        ctx.lineTo(x, verticalBase);
    }

    ctx.lineTo(canvas.width, canvas.height);
    ctx.closePath();
    ctx.fill();
}

const aiScreen = document.getElementById('ai-screen');
const aiContent = document.querySelector('.ai-content');
const aiOpen = document.getElementById('ai-open-btn');
const aiClose = document.getElementById('ai-close-btn');

aiOpen.addEventListener('click', () => {
    isAiActive = true;
    waveProgress = 0;
    aiScreen.style.opacity = '1';
    aiScreen.style.pointerEvents = 'all';
    
    drawWaves();

    setTimeout(() => {
        aiContent.style.opacity = '1';
        aiContent.style.transform = 'translateY(0)';
    }, 300);
});

aiClose.addEventListener('click', () => {
    aiContent.style.opacity = '0';
    aiContent.style.transform = 'translateY(50px)';
    
    let retractInterval = setInterval(() => {
        waveProgress -= 0.04;
        if(waveProgress <= 0) {
            clearInterval(retractInterval);
            isAiActive = false;
            cancelAnimationFrame(animationFrameId);
            aiScreen.style.opacity = '0';
            aiScreen.style.pointerEvents = 'none';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    }, 16);
});

// --- AI LOGIC ENGINE ---
const aiInput = document.getElementById('ai-input');
const aiSendBtn = document.getElementById('ai-send-btn');
const aiMessages = document.getElementById('ai-messages');

function appendAiMessage(sender, text, isOutgoing = false) {
    const msg = document.createElement('div');
    msg.className = `message ${isOutgoing ? 'outgoing' : 'incoming'}`;
    if(!isOutgoing) {
        msg.style.background = 'rgba(255,0,127,0.05)';
        msg.style.border = '1px solid rgba(255,0,127,0.1)';
    }
    
    const tag = document.createElement('span');
    tag.className = 'user-tag';
    tag.style.color = isOutgoing ? 'var(--neon-purple)' : 'var(--neon-pink)';
    tag.innerText = sender;

    msg.appendChild(tag);
    msg.appendChild(document.createTextNode(text));
    aiMessages.appendChild(msg);
    aiMessages.scrollTop = aiMessages.scrollHeight;
}

function handleAiCommunication() {
    const prompt = aiInput.value.trim();
    if(!prompt) return;

    appendAiMessage(username, prompt, true);
    aiInput.value = '';

    setTimeout(() => {
        let systemReply = "Processing query inside local matrix parameters... Core processing nodes indicate successful reception. Let me know if you'd like to construct specialized logic algorithms, optimize mock datasets, or write complex narrative structures.";
        
        const queryLower = prompt.toLowerCase();
        if(queryLower.includes('hello') || queryLower.includes('hi')) {
            systemReply = `Hello ${username}. System parameters are fully nominal. How can I assist your terminal operations today?`;
        } else if (queryLower.includes('help')) {
            systemReply = "Available modules: 1. Code Construction & Debugging. 2. Creative Narrative Design. 3. Mathematical Analytical Computations. State your intended direction.";
        } else if (queryLower.includes('meaning of life')) {
            systemReply = "The resolution to your inquiry depends heavily on the framework applied. Philosophically, it centers on creation of purpose; biologically, continuation; computational, processing optimization.";
        }

        appendAiMessage("AI OMNI", systemReply, false);
    }, 1000);
}

aiSendBtn.addEventListener('click', handleAiCommunication);
aiInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') handleAiCommunication(); });
</script>
